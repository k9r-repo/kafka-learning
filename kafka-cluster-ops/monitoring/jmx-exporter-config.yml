# JMX Exporter configuration for Kafka brokers
# This file defines which JMX metrics to expose to Prometheus

lowercaseOutputName: true
lowercaseOutputLabelNames: true

# Whitelist of JMX metrics to collect
whitelistObjectNames:
  - kafka.server:*
  - kafka.cluster:*
  - kafka.controller:*
  - kafka.network:*
  - kafka.log:*
  - java.lang:*

# Blacklist patterns (exclude noisy metrics)
blacklistObjectNames:
  - kafka.consumer:type=*,id=*
  - kafka.consumer:type=*,client-id=*
  - kafka.consumer:type=*,client-id=*,node-id=*
  - kafka.producer:type=*,id=*
  - kafka.producer:type=*,client-id=*
  - kafka.producer:type=*,client-id=*,node-id=*

# Custom rules for specific metrics
rules:
  # Broker metrics
  - pattern: kafka.server<type=(.+), name=(.+), clientId=(.+), topic=(.+), partition=(.*)><>Value
    name: kafka_server_$1_$2
    type: GAUGE
    labels:
      clientId: "$3"
      topic: "$4"
      partition: "$5"

  - pattern: kafka.server<type=(.+), name=(.+), clientId=(.+), brokerHost=(.+), brokerPort=(.+)><>Value
    name: kafka_server_$1_$2
    type: GAUGE
    labels:
      clientId: "$3"
      broker: "$4:$5"

  # Network request metrics
  - pattern: kafka.network<type=RequestMetrics, name=RequestsPerSec, request=(.+)><>Count
    name: kafka_network_requests_per_sec_total
    type: COUNTER
    labels:
      request: "$1"

  # Log flush metrics
  - pattern: kafka.log<type=LogFlushStats, name=LogFlushRateAndTimeMs><>Count
    name: kafka_log_flush_total
    type: COUNTER

  # Controller metrics
  - pattern: kafka.controller<type=(.+), name=(.+)><>(Value|Count)
    name: kafka_controller_$1_$2
    type: GAUGE

  # Partition count metrics
  - pattern: kafka.server<type=ReplicaManager, name=(.+)><>(Value|Count)
    name: kafka_server_replicamanager_$1
    type: GAUGE

  # Catch-all for other important metrics
  - pattern: kafka.(.+)<type=(.+), name=(.+)><>Value
    name: kafka_$1_$2_$3
    type: GAUGE
